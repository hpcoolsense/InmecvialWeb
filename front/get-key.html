<!DOCTYPE html>
<html><head><title>Get Web3Forms Key</title></head>
<body style="font-family:sans-serif;padding:40px;background:#111;color:#fff">
<h2>Generar Web3Forms Access Key</h2>
<p>Click el botón. Se enviará un key a erichponce11@gmail.com. Copiá el key del email y pasámelo.</p>
<button onclick="getKey()" style="padding:16px 32px;font-size:1rem;cursor:pointer;background:#E8A126;border:none;color:#000;font-weight:bold">Generar Key</button>
<pre id="result" style="margin-top:20px;color:#25D366"></pre>
<script>
async function getKey() {
  document.getElementById('result').textContent = 'Generando...';
  try {
    const res = await fetch('https://api.web3forms.com/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: 'erichponce11@gmail.com' })
    });
    const data = await res.json();
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
}
</script>
</body></html>
